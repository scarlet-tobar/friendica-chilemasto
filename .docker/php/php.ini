;PHP Configuration für Friendica Development
memory_limit = 512M
max_execution_time = 300
max_input_time = 60
max_input_vars = 10000
upload_max_filesize = 100M
post_max_size = 100M

;Display errors nur für development!
display_errors = On
display_startup_errors = On
error_reporting = E_ALL

;Database settings
[mysqli]
mysqli.allow_local_infile = On
mysqli.allow_persistent = On
mysqli.cache_size = 2000
mysqli.max_persistent = -1
mysqli.max_links = -1
mysqli.default_port = 3306
mysqli.default_socket = /tmp/mysql.sock
mysqli.default_host = mariadb
mysqli.default_user = friendica

;Socket configuration for MySQL
default_socket = /tmp/mysql.sock

;OPcache settings recommended for production-like performance
[opcache]
opcache.enable = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 10000
opcache.use_cwd = 1
opcache.validate_timestamps = 1
opcache.revalidate_freq = 60

;Development aids
log_errors = On
log_errors_max_len = 1024

;CLI specific
cli_server.color = On
