upstream php {
    server php:9000;
}

server {
    listen 80;
    server_name localhost;
    root /var/www/html;
    index index.php index.html index.htm;

    # Client upload size limit
    client_max_body_size 100M;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Disable access to hidden files
    location ~ /\. {
        deny all;
    }

    # Disable access to composer files
    location ~ /(composer\.json|composer\.lock) {
        deny all;
    }

    # Friendica rewrite rules
    location / {
        try_files $uri $uri/ /index.php?pagename=$uri&$args;
    }

    # Pass PHP files to PHP-FPM
    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;

        fastcgi_pass php;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # htaccess [E=REMOTE_USER:%{HTTP:Authorization}]
        fastcgi_param REMOTE_USER $http_authorization;

        # htaccess [QSA,B] Flags
        fastcgi_param QUERY_STRING $args;
        fastcgi_param REQUEST_URI $request_uri?$args;
        fastcgi_param REDIRECT_QUERY_STRING $args;

        fastcgi_buffer_size 128k;
        fastcgi_buffers 256 16k;
        fastcgi_busy_buffers_size 256k;
    }

    # Cache static files
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
